<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Box Background -->
  <rect x="20" y="20" width="160" height="160" rx="30" fill="#FF9F43" />
  
  <!-- Stylized Cube/Box Perspective -->
  <path d="M100 40 L160 70 L160 130 L100 160 L40 130 L40 70 Z" fill="#FFB142" opacity="0.8" />
  <path d="M100 40 L160 70 L100 100 L40 70 Z" fill="#FFEAA7" />
  <path d="M40 70 L100 100 L100 160 L40 130 Z" fill="#FAD390" />
  
  <!-- Stylized Tool/Game Element (Wrench/Plus) -->
  <circle cx="100" cy="100" r="25" fill="#1DD1A1" />
  <rect x="92" y="85" width="16" height="30" rx="4" fill="white" />
  <rect x="85" y="92" width="30" height="16" rx="4" fill="white" />
  
  <!-- Subtle Glow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
